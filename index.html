<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>漢字テスト</title>

<style>

body{
font-family:sans-serif;
max-width:850px;
margin:auto;
padding:20px;
text-align:center;
background:#fafafa;
}

.hidden{
display:none;
}

.card{
background:white;
border-radius:16px;
padding:25px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.question{
font-size:32px;
line-height:1.8;
}

.reading{
font-size:20px;
color:#666;
margin-bottom:20px;
}

.answer{
font-size:36px;
margin:24px 0;
}

.red{
color:#d90000;
font-weight:bold;
}

button{
padding:12px 18px;
font-size:18px;
margin:8px;
border:none;
border-radius:10px;
background:#0a63d8;
color:white;
}

button:hover{
opacity:.9;
}

.result{
text-align:left;
}

@media(max-width:600px){

.question{
font-size:26px;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<h1>漢字テスト</h1>

<div id="menu">

<h2>出題数</h2>

<button onclick="start(15)">
ランダム15問
</button>

<button onclick="start(30)">
ランダム30問
</button>

<button onclick="start(45)">
ランダム45問
</button>

<button onclick="start(all.length)">
ランダム全問
</button>

</div>

<div id="card" class="card hidden">

<div id="progress"></div>

<div id="reading" class="reading"></div>

<div id="question" class="question"></div>

<div id="answer" class="answer hidden"></div>

<button onclick="showAnswer()">
答えを見る
</button>

<div id="judge" class="hidden">

<button onclick="judge(true)">
○ 正解
</button>

<button onclick="judge(false)">
× 不正解
</button>

</div>

</div>

<div id="result" class="card hidden result"></div>

<script>

const all=[

["しんごうをまもる","□号を守る","信号を守る"],
["そくたつでおくる","□達で送る","速達で送る"],
["ひととあうきかい","人と会う□会","人と会う機会"],
["きかいでつくる","機□で作る","機械で作る"],
["とりのむれ","鳥の＿＿","鳥の群れ"],
["ただしくつたえる","正しく＿＿","正しく伝える"],
["しずかなもり","□かな森","静かな森"],
["ひこうきがとぶ","□□□が飛ぶ","飛行機が飛ぶ"],
["せつどのあるこうどう","□□のある行動","節度のある行動"],
["おしえをとく","教えを＿＿","教えを説く"],
["ちょうせいをこころみる","調整を＿＿＿","調整を試みる"],
["ゆうめいなかんこうちにいく","有名な□□□へ行く","有名な観光地へ行く"],
["こっきをかかげる","□□をかかげる","国旗をかかげる"],
["ゆうりなたちば","□□な立場","有利な立場"],
["ぐざいをきる","□□を切る","具材を切る"],
["むかしのせきしょ","昔の□□","昔の関所"],
["ひゃくさついじょうのほん","百さつ□□の本","百さつ以上の本"],
["たけのふし","竹の□","竹の節"],
["しきをたのしむ","□□を楽しむ","四季を楽しむ"],
["さくねんのにっき","□□の日記","昨年の日記"],
["おんがくをあいする","音楽を＿＿","音楽を愛する"],
["れいせいにかんがえる","冷□に考える","冷静に考える"],
["かみにいんじする","紙に□□する","紙に印字する"],
["きょうくんをまなぶ","□□を学ぶ","教訓を学ぶ"],
["もくひょうをたっせいする","目標を□□する","目標を達成する"],
["じしょをかりる","□□をかりる","辞書をかりる"],
["うたをろくおんする","歌を□□する","歌を録音する"],
["えきまでのみちじゅん","駅までの□□","駅までの道順"],
["しきてんにしゅっせきする","□□に出席する","式典に出席する"],
["じょうしとぶか","□□と部下","上司と部下"],
["きかいたいそうをする","器□体操をする","器械体操をする"],
["どうきをたずねる","□□をたずねる","動機をたずねる"],
["たぐいまれなうたごえのかしゅ","□まれな歌声の歌手","類まれな歌声の歌手"],
["くすりのようほうをまもる","薬の□□を守る","薬の用法を守る"],
["たとえばのはなし","＿＿の話","例えばの話"],
["こうつうあんぜんのひょうご","交通安全の□□","交通安全の標語"],
["ひこうじょうへいく","□□□へ行く","飛行場へ行く"],
["てがみをはいたつする","手紙を□□する","手紙を配達する"],
["じしんがつく","□□がつく","自信がつく"],
["やさいをたべる","□□を食べる","野菜を食べる"],
["がっこうをけんせつする","学校を□設する","学校を建設する"],
["じぶんのせきにつく","自分の□に着く","自分の席に着く"],
["じょうかまちにすむ","□□□に住む","城下町に住む"],
["はじめのあいさつ","＿＿のあいさつ","始めのあいさつ"],
["けいきがよくなる","□□が良くなる","景気が良くなる"],
["ひつじのいちぐん","羊の□□","羊の一群"],
["ひっしにさけぶ","□□にさけぶ","必死にさけぶ"],
["チームのかなめ","チームの□","チームの要"],
["ちゅうもくのまとになる","注目の□になる","注目の的になる"],
["せいふのはっぴょう","政□の発表","政府の発表"],
["いばらのみち","□の道","茨の道"],
["とちのみをひろう","□の実を拾う","栃の実を拾う"],
["ならくのそこ","□□の底","奈落の底"],
["ひがたのいきもの","干□の生き物","干潟の生き物"],
["わだいがほうふだ","話題が豊□だ","話題が豊富だ"],
["いどのみず","□□の水","井戸の水"],
["なしをたべる","□を食べる","梨を食べる"],
["こめのおもさをはかる","米の重さを＿＿","米の重さを量る"],
["エジソンのでんき","エジソンの□□","エジソンの伝記"]

];

let questions=[];
let mistakes=[];
let index=0;
let correct=0;
let count=0;

function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

function start(c){

count=c;

questions=
shuffle(all)
.slice(
0,
Math.min(c,all.length)
);

mistakes=[];

index=0;

correct=0;

menu.classList.add("hidden");

result.classList.add("hidden");

card.classList.remove("hidden");

show();

}

function show(){

if(index>=questions.length){

finish();

return;

}

let q=questions[index];

progress.innerHTML=
`${index+1}/${questions.length}`;

reading.innerHTML=
q[0];

question.innerHTML=
q[1];

answer.classList.add("hidden");

judge.classList.add("hidden");

}

function showAnswer(){

let q=questions[index];

let hidden=
q[1]
.replace(/[^□＿]/g,"")
.length;

answer.innerHTML=
q[2].replace(
q[2].substring(0,hidden),
`<span class="red">${
q[2].substring(0,hidden)
}</span>`
);

answer.classList.remove("hidden");

judge.classList.remove("hidden");

}

function judge(ok){

if(ok){

correct++;

}else{

mistakes.push(
questions[index]
);

}

index++;

show();

}

function finish(){

card.classList.add("hidden");

let html=
`<h2>終了</h2>
<p>${correct}/${questions.length}</p>
<p>正答率 ${
Math.round(
correct/
questions.length
*100
)
}%</p>`;

if(
mistakes.length
){

html+=
"<h3>間違えた問題</h3>";

mistakes.forEach(

m=>{

html+=
`
<div>

${m[1]}
<br>

→
${m[2]}

</div>

<hr>
`;

}

);

html+=
`
<button
onclick="
retry()
">

間違えた問題だけ再出題

</button>
`;

}

html+=
`
<button
onclick="
start(count)
">

同じ条件でもう一回

</button>

<button
onclick="
backMenu()
">

メニューへ

</button>
`;

result.innerHTML=
html;

result.classList.remove(
"hidden"
);

}

function retry(){

questions=
shuffle(
mistakes
);

mistakes=[];

index=0;

correct=0;

card.classList.remove(
"hidden"
);

result.classList.add(
"hidden"
);

show();

}

function backMenu(){

menu.classList.remove(
"hidden"
);

result.classList.add(
"hidden"
);

}

</script>

</body>
</html>
